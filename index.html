<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Async Weather Tracker</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#ececec;
}

/* FULL SCREEN CONTAINER */
.container{
    width:100%;
    min-height:100vh;
    margin:0;
    background:linear-gradient(180deg,#1f2a60,#283593);
    padding:30px;
    box-sizing:border-box;
    color:white;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

/* HORIZONTAL LIKE YOUR IMAGE */
.top-section{
    display:flex;
    gap:20px;
}

/* CARDS */
.card{
    background:#f4f4f4;
    color:black;
    flex:1;
    padding:20px;
    border-radius:8px;
}

/* CONSOLE FULL WIDTH */
.console{
    margin-top:20px;
}

/* INPUT + BUTTON */
label{
    font-weight:bold;
    font-size:14px;
    display:block;
    margin-bottom:5px;
}

.search-box{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

input{
    flex:1;
    padding:8px;
    border:1px solid #ccc;
    border-radius:4px;
}

button{
    background:#ff6b35;
    border:none;
    color:white;
    padding:8px 14px;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#e85a2a;
}

#history button{
    margin:3px;
    padding:4px 8px;
    font-size:12px;
}

/* WEATHER DISPLAY */
.weather-result div{
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #ddd;
    padding:6px 0;
}

/* CONSOLE BOX */
#consoleOutput{
    background:#162447;
    color:#00e5ff;
    padding:12px;
    height:180px;
    overflow:auto;
    border-radius:6px;
    font-family:monospace;
    font-size:13px;
}
</style>

</head>
<body>

<div class="container">

    <h1>🌤 Async Weather Tracker</h1>

    <div class="top-section">

        <!-- LEFT CARD -->
        <div class="card">
            <label>Search City</label>
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Enter city name">
                <button onclick="getWeather()">Search</button>
            </div>

            <label>Search History</label>
            <div id="history"></div>
        </div>

        <!-- RIGHT CARD -->
        <div class="card">
            <label>Weather Info</label>
            <div id="weatherResult" class="weather-result">
                No data yet
            </div>
        </div>

    </div>

    <!-- FULL WIDTH CONSOLE -->
    <div class="card console">
        <label>Console – Event Loop</label>
        <div id="consoleOutput"></div>
    </div>

</div>

<script>
const consoleBox = document.getElementById("consoleOutput");
const historyBox = document.getElementById("history");
const resultBox = document.getElementById("weatherResult");

let history = [];

/* Dummy weather database */
const weatherDB = {
    indore: {
        city: "Indore, IN",
        temp: "21.1 °C",
        weather: "Haze",
        humidity: "52%",
        wind: "5.14 m/s"
    },
    delhi: {
        city: "Delhi, IN",
        temp: "24.3 °C",
        weather: "Clear",
        humidity: "48%",
        wind: "3.20 m/s"
    }
};

/* Console log */
function log(msg){
    const div = document.createElement("div");
    div.textContent = msg;
    consoleBox.appendChild(div);
    consoleBox.scrollTop = consoleBox.scrollHeight;
}

/* Search weather */
function getWeather(cityName){

    const input =
        cityName ||
        document.getElementById("cityInput").value.toLowerCase();

    consoleBox.innerHTML = "";

    log("[Sync] Start");

    setTimeout(() => {

        log("[Async] Start fetching");

        Promise.resolve().then(() => {

            log("[Promise.then] (Microtask)");

            setTimeout(() => {

                log("[setTimeout] (Macrotask)");

                if(weatherDB[input]){

                    showWeather(weatherDB[input]);
                    addHistory(input);

                    log("[Async] Data received");

                }else{
                    resultBox.innerHTML =
                    `<span style="color:red;">City not found</span>`;
                }

            },500);

        });

    },500);

    log("[Sync] End");
}

/* Show weather */
function showWeather(data){
    resultBox.innerHTML = `
        <div><span>City</span><span>${data.city}</span></div>
        <div><span>Temp</span><span>${data.temp}</span></div>
        <div><span>Weather</span><span>${data.weather}</span></div>
        <div><span>Humidity</span><span>${data.humidity}</span></div>
        <div><span>Wind</span><span>${data.wind}</span></div>
    `;
}

/* Add history */
function addHistory(city){
    if(history.includes(city)) return;

    history.push(city);

    const btn = document.createElement("button");

    btn.textContent =
        city.charAt(0).toUpperCase() + city.slice(1);

    btn.onclick = () => getWeather(city);

    historyBox.appendChild(btn);
}
</script>

</body>
</html>
