
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg-start: #0f3550;
            --bg-end: #1d6c86;
            --card-bg: #f7fbfd;
            --text-main: #113247;
            --text-soft: #4f6d7d;
            --accent: #ff7a3d;
            --accent-hover: #e9652b;
            --border-soft: #c9e4ef;
            --item-bg: #eaf6fb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1300px;
            margin: auto;
        }

        .parent-card {
            display: flex;
            gap: 20px;
        }

        h1 {
            text-align: center;
            color: #e8f7ff;
            margin-bottom: 20px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
            color: var(--text-main);
            box-shadow: 0 10px 24px rgba(7, 39, 56, 0.15);
        }

        h3 {
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 2px solid var(--border-soft);
            outline: none;
            color: var(--text-main);
            background: #fff;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255, 122, 61, 0.2);
        }

        button {
            padding: 10px 20px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .weather-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-left: 4px solid var(--accent);
            margin-bottom: 6px;
            background: var(--item-bg);
            color: var(--text-main);
            border-radius: 6px;
        }

        .console {
            background: #161E54;
            color: #BBE0EF;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            max-height: 250px;
            overflow-y: auto;
        }

        .log.async {
            border-left: 3px solid #F16D34;
            padding-left: 6px;
        }

        .log.promise {
            border-left: 3px solid #FF986A;
            padding-left: 6px;
        }

        .log.callback {
            border-left: 3px solid #BBE0EF;
            padding-left: 6px;
        }

        .history button {
            margin: 5px;
            padding: 6px 14px;
            border-radius: 20px;
            background: #2a8eac;
        }

        .history button:hover {
            background: #237a94;
        }

        @media (max-width:700px) {
            .parent-card {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>🌤 Async Weather Tracker</h1>

        <div class="parent-card">
            <div class="card">
                <h3>Search City</h3>
                <div class="input-group">
                    <input id="cityInput" placeholder="Delhi, London">
                    <button id="searchBtn">Search</button>
                </div>
                <br>
                <br>
                <h3>Search History</h3>
                <div class="history" id="history"></div>
            </div>

            <div class="card">
                <h3>Weather Info</h3>
                <div id="weather"></div>
            </div>
        </div>

        <!-- <div class="card">
            <h3>Console – Event Loop</h3>
            <div class="console" id="console"></div>
        </div> -->

    </div>

    <script>
        const API_KEY = "b926bdadc2bb33e4e8ba9854662ed15c";
        //    const API_KEY = "b926bdadc2bb33e4e8ba9854662ed15c";

        const cityInput = document.getElementById("cityInput");
        const HISTORY_KEY = "weatherSearchHistory";
        const weatherBox = document.getElementById("weather");
        const historyBox = document.getElementById("history");
        let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");

        /* ---------- WEATHER FETCH ---------- */
        async function getWeather(city) {

            // small delay for smoother UI
            // await new Promise(r => setTimeout(r, 500));

            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );
            if (!res.ok) {
                alert("city not found");
                throw new Error("City not found");
            }
            const data = await res.json();
            return data;
        }

         /* ---------- BUTTON CLICK ---------- */
        document.getElementById("searchBtn").onclick = () => {
            const city = cityInput.value.trim();
            if (city) {
                search(city);
            }
        };

        /* ---------- UI RENDER ---------- */
        function renderWeather(d) {
            weatherBox.innerHTML = `
        <div class="weather-item"><label>City</label><span>${d.name}, ${d.sys.country}</span></div>
        <div class="weather-item"><label>Temperature</label><span>${d.main.temp} °C</span></div>
        <div class="weather-item"><label>Weather</label><span>${d.weather[0].main}</span></div>
        <div class="weather-item"><label>Humidity</label><span>${d.main.humidity}%</span></div>
        <div class="weather-item"><label>Wind Speed</label><span>${d.wind.speed} m/s</span></div>
    `;
        }

        /* ---------- SAVE SEARCH HISTORY ---------- */
        function saveHistory(city) {
            if (history.includes(city)) return;

            history.push(city);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));

            const btn = document.createElement("button");

            btn.textContent =
                city.charAt(0).toUpperCase() + city.slice(1);

            btn.onclick = () => search(city);

            historyBox.appendChild(btn);
            
        }

        /* ---------- SHOW HISTORY ---------- */
        function showHistory() {
            historyBox.innerHTML = "";

            history.forEach((city) => {
                const btn = document.createElement("button");
                btn.textContent = city.charAt(0).toUpperCase() + city.slice(1);
                btn.onclick = () => search(city);
                historyBox.appendChild(btn);
            });
        }

        /* ---------- SEARCH FUNCTION ---------- */
        async function search(city) {
            weatherBox.innerHTML = "";
            try {
                const data = await getWeather(city);
                renderWeather(data);
                saveHistory(data.name); 
            } catch (error) {
                weatherBox.innerHTML = `<p style="color:red">${error.message}</p>`;
            }
        }
       
        /* ---------- ENTER KEY SEARCH ---------- */
        cityInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const city = cityInput.value.trim();
                if (city) {
                    search(city);
                }
            }
        });
        /* ---------- INITIAL LOAD ---------- */
        showHistory();
    </script>
</body>

</html>
